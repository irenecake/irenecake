    <style>
        /* Общие настройки чистого белого фона */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 40px 0; text-align: center; color: #333333; }
        
        /* Розовая шапка сверху */
        .header-box { background-color: #fcf0f2; margin: -40px 0 30px 0; padding: 40px 20px; border-bottom: 1px solid #f3d7dd; }
        .header-box h1 { font-size: 32px; font-weight: 300; letter-spacing: 3px; margin: 0 0 10px 0; color: #8c767a; text-transform: uppercase; }
        .header-box h2 { font-size: 14px; font-weight: 400; letter-spacing: 2px; margin: 0; color: #8c767a; text-transform: uppercase; }
        
        /* Контейнер для кнопок меню (как на Таплинке) */
        .button-container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
        
        /* Текстовые подписи между кнопками */
        .menu-label { font-size: 14px; letter-spacing: 1px; color: #8c767a; margin: 25px 0 10px 0; text-transform: lowercase; font-weight: 300; }
                /* Правила для ленты фотографий */
        .photo-gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 1000px; margin: 20px auto 0 auto; padding: 0 20px; }
        .photo-item { width: 220px; height: 220px; overflow: hidden; border-radius: 10px; border: 1px solid #eaeaea; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

        
        /* Стиль больших скругленных кнопок из вашего примера */
        .tap-link { display: block; background-color: #c4967a; color: #ffffff; text-decoration: none; padding: 16px 20px; border-radius: 30px; font-size: 16px; font-weight: 500; letter-spacing: 1px; margin-bottom: 15px; transition: background-color 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tap-link:hover { background-color: #b38569; }
    </style>
</head>
